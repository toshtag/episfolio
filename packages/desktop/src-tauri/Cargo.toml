[package]
name = "episfolio-app"
version = "0.2.2"
description = "Episfolio desktop app"
authors = ["Episfolio contributors"]
license = "MIT"
edition = "2021"
rust-version = "1.77"

[lib]
name = "episfolio_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.39", features = ["bundled"] }
ulid = "1.2"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
